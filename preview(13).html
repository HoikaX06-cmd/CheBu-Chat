<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ChebU-chat</title>
<style>
  /* Общий стиль */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExczV4ZG9rZ3lzenNsdnk4OWh0Y3cxbXNlczhvOG54ODVxb2t2bGQybyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/BHNfhgU63qrks/giphy.gif") no-repeat center center fixed;
    background-size: cover;
  }

  #overlay {
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.5);
    z-index:0;
  }

  .container {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 20px;
  }

  #title {
    font-size: 36px;
    color: #fff;
    margin-bottom: 10px;
  }

  input {
    display:block;
    margin:5px 0;
    padding:5px;
    width:200px;
    border:1px solid black;
    border-radius:4px;
  }

  button {
    padding:5px 10px;
    margin:5px;
    border:1px solid black;
    border-radius:4px;
    cursor:pointer;
  }

  #telegram {
    position: absolute;
    bottom: 20px;
    font-size: 18px;
    color: #9b59b6; /* фиолетово-сиреневый */
    z-index:2;
  }

  #telegram a {
    color: #9b59b6;
    text-decoration:none;
  }

  #left-gif {
    position:absolute;
    top:20%;
    left:10px;
    width:150px;
    z-index:2;
  }

  #right-sticker {
    position:absolute;
    bottom:0;
    right:0;
    width:100px;
    z-index:2;
  }

  .chat-window {
    display:flex;
    flex-direction:column;
    align-items:center;
    background: rgba(255,255,255,0.1);
    padding:10px;
    border-radius:8px;
    gap:10px;
  }
</style>
</head>
<body>
<div id="overlay"></div>

<div class="container">
  <div id="title"></div>

  <div class="chat-window" id="auth-window">
    <input type="text" id="nickname" placeholder="Ник">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <input type="text" id="chat-key" placeholder="Ключ чата">
    <div>
      <button id="register">Регистрация</button>
      <button id="login">Войти</button>
      <button id="logout">Выйти</button>
    </div>
  </div>

  <div class="chat-window" id="chat">
    <input type="text" id="message" placeholder="Сообщение">
    <button id="send">Отправить</button>
  </div>

  <div id="telegram">
    Присоединяйся к нашему <a href="https://t.me/+EB8M8N-icHsyYjZi" target="_blank">Telegram</a>
  </div>
</div>

<img id="left-gif" src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExbWNqeWNtMGlkeGpzenp5OWJzMGJldnB4d2RmOGttMTdsN2RicXI0ZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/11lxCeKo6cHkJy/giphy.gif" alt="GIF">
<img id="right-sticker" src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExcW04dngycTcyNGo4cHhodWVncHBhcnpqM3pxMndscTQydXg5bTh0ciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/fcU03QTYVVcJs1jKIa/giphy.gif" alt="Sticker">

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBAmyR-jy2c4Ul25X1A6USk1CIFaHKBFHs",
  authDomain: "web-mes-1b683.firebaseapp.com",
  projectId: "web-mes-1b683",
  storageBucket: "web-mes-1b683.firebasestorage.app",
  messagingSenderId: "1039122673520",
  appId: "1:1039122673520:web:b8e727d83957e2565ae9b5"
};

// Инициализация Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Анимация ChebU-chat
document.addEventListener("DOMContentLoaded", () => {
  const titleEl = document.getElementById("title");
  const text = "ChebU-chat";
  let i = 0, forward = true;

  function typeAnimation() {
    if(forward) { i++; if(i===text.length) forward=false; }
    else { i--; if(i===0) forward=true; }
    titleEl.textContent = text.slice(0,i);
    setTimeout(typeAnimation,150);
  }
  typeAnimation();

  // Кнопки
  document.getElementById("register").onclick = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    try { await createUserWithEmailAndPassword(auth,email,password); alert("Регистрация успешна!"); } 
    catch(e){ alert(e.message); }
  };
  document.getElementById("login").onclick = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    try { await signInWithEmailAndPassword(auth,email,password); alert("Вход успешен!"); } 
    catch(e){ alert(e.message); }
  };
  document.getElementById("logout").onclick = () => {
    signOut(auth);
    alert("Выход выполнен!");
  };
  document.getElementById("send").onclick = async () => {
    const msg = document.getElementById("message").value;
    if(msg.trim()!=="") {
      await addDoc(collection(db,"messages"),{text: msg, created: Date.now()});
      document.getElementById("message").value = "";
    }
  };
});
</script>
</body>
</html>
